<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wearable Birthday Wish System</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a; --panel-bg: #1e293b; --accent: #38bdf8;
            --success: #10b981; --danger: #ef4444; --text-main: #f8fafc;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .wearable-container { width: 340px; height: 450px; background: #000; border-radius: 60px; border: 14px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,255,255,0.1); position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .screen { padding: 25px 20px; height: 100%; overflow-y: auto; display: none; flex-direction: column; }
        .screen.active { display: flex; }
        .screen::-webkit-scrollbar { display: none; }
        
        h2 { font-size: 1.1rem; margin: 0 0 15px 0; color: var(--accent); text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; background: var(--panel-bg); color: white; border: 1px solid #475569; outline: none; }
        button { width: 100%; padding: 14px; border-radius: 25px; border: none; font-weight: 600; background: var(--accent); color: #000; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        button:disabled { background: #475569; cursor: not-allowed; }
        .btn-capture { background: #db2777; color: white; }
        .btn-success { background: var(--success); color: white; }
        
        #camera-feed { width: 100%; border-radius: 12px; background: #222; margin-bottom: 10px; object-fit: cover; height: 180px; }
        #canvas-capture { display: none; }
        
        .sys-log { font-family: monospace; font-size: 0.7rem; color: #4ade80; background: #000; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: left; overflow-wrap: break-word; }
        
        .viewer-container { width: 100vw; height: 100vh; background: radial-gradient(circle, #1e293b, #0f172a); display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .viewer-container.active { display: flex; }
        
        .auth-gate { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 24px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); max-width: 400px; width: 100%; }
        #recipient-password { text-align: center; font-size: 1.5rem; letter-spacing: 5px; font-weight: bold; background: rgba(0,0,0,0.5); border: 2px solid var(--accent); }
        
        .animated-text { font-family: 'Pacifico', cursive; font-size: 3rem; color: #fde047; text-shadow: 0 0 20px rgba(253,224,71,0.5); opacity: 0; }
        .typewriter { overflow: hidden; white-space: pre-wrap; margin: 0 auto; letter-spacing: 2px; animation: typing 3s steps(40, end), blink-caret .75s step-end infinite; }
        .fade-in { animation: fadeIn 2s forwards; animation-delay: 1s; }
        @keyframes fadeIn { to { opacity: 1; } }
        
        .memory-frame { width: 100%; max-width: 300px; border-radius: 20px; border: 4px solid #fde047; margin-top: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); opacity: 0; transform: translateY(50px); animation: slideUp 1.5s forwards; animation-delay: 2.5s; }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        
        .blur-screen { filter: blur(20px) grayscale(100%); pointer-events: none; }
        .watermark { position: absolute; bottom: 10px; right: 10px; font-size: 0.6rem; color: rgba(255,255,255,0.3); pointer-events: none; z-index: 100; }
        #qrcode { background: white; padding: 10px; border-radius: 10px; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- WEARABLE SENDER -->
    <div id="wearable-device" class="wearable-container">
        <div id="screen-compose" class="screen active">
            <h2>🎂 Birthday Wish</h2>
            <input type="text" id="contact-name" placeholder="Contact Name" value="Alex">
            <textarea id="wish-message" rows="2" placeholder="Message...">Happy 25th Birthday! 🎉</textarea>
            <input type="password" id="wish-password" placeholder="Set Password (e.g. 1234)" style="border: 2px solid var(--accent);">
            <button onclick="navTo('screen-capture')">Next: Capture Moment 📸</button>
        </div>

        <div id="screen-capture" class="screen">
            <h2>📸 Smart Capture</h2>
            <video id="camera-feed" autoplay playsinline></video>
            <canvas id="canvas-capture"></canvas>
            <button class="btn-capture" onclick="captureMoment()">🔘 Snap Memory</button>
            <button onclick="navTo('screen-compose')" style="background:transparent; border:1px solid #475569; color:white;">Back</button>
        </div>

        <div id="screen-encrypting" class="screen">
            <h2>🔐 Compiling Payload</h2>
            <div id="sys-log-box" class="sys-log">
                > Initializing Zero-Knowledge Engine...<br>
            </div>
        </div>

        <div id="screen-delivery" class="screen">
            <h2>📨 Ready to Send</h2>
            <div id="qrcode"></div>
            <button class="btn-success" onclick="copySecureUrl()">📋 Copy Secure Link</button>
            <div style="font-size: 0.7rem; text-align: center; margin-top:10px; color:#94a3b8;">100% Ad-Blocker Proof Architecture</div>
        </div>
    </div>

    <!-- RECIPIENT VIEWER -->
    <div id="viewer-device" class="viewer-container">
        <div id="auth-gate" class="auth-gate">
            <h2 style="color:white; font-size:1.8rem; margin-bottom: 5px;">🔒 Private Wish</h2>
            <p style="color:#94a3b8; font-size:0.9rem; margin-bottom: 20px;">Enter the secret password to decrypt.</p>
            <input type="password" id="recipient-password" placeholder="••••">
            <button id="unlock-btn" class="btn-success" onclick="authenticateRecipient()">🔓 Unlock Wish</button>
            <div class="sys-log" style="text-align: center; margin-top:20px;">Stateless Vault • E2E Encrypted</div>
        </div>

        <div id="render-canvas" style="display:none; flex-direction:column; align-items:center;">
            <div id="animated-msg" class="animated-text typewriter"></div>
            <img id="decrypted-media" class="memory-frame" src="">
            <div class="watermark" id="forensic-watermark"></div>
        </div>
    </div>

    <script>
        const AppState = { capturedImageBase64: null, secureUrl: null, cameraStream: null };

        function navTo(screenId) {
            if (screenId === 'screen-capture' && !document.getElementById('wish-password').value) {
                alert("Please set a password!"); return;
            }
            document.querySelectorAll('.wearable-container .screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if(screenId === 'screen-capture') startCamera();
            if(screenId !== 'screen-capture') stopCamera();
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                document.getElementById('camera-feed').srcObject = stream;
                AppState.cameraStream = stream;
            } catch (err) {
                // Dummy image if camera fails
                AppState.capturedImageBase64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=="; 
            }
        }

        function stopCamera() { if(AppState.cameraStream) AppState.cameraStream.getTracks().forEach(t => t.stop()); }

        function captureMoment() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('canvas-capture');
            if(video.srcObject) {
                // HEAVY COMPRESSION: Make the image tiny so it fits inside the URL
                const targetWidth = 150; 
                const scale = targetWidth / video.videoWidth;
                canvas.width = targetWidth;
                canvas.height = video.videoHeight * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(255,255,255,0.7)";
                ctx.font = "8px Arial";
                ctx.fillText(`Secure: ${new Date().toLocaleTimeString()}`, 5, 15);
                
                // Compress to 20% quality for URL embedding
                AppState.capturedImageBase64 = canvas.toDataURL('image/jpeg', 0.2); 
            }
            executePrivacyEngine();
        }

        // --- STATELESS ZERO-KNOWLEDGE ENGINE ---
        function executePrivacyEngine() {
            navTo('screen-encrypting');
            const logBox = document.getElementById('sys-log-box');
            const appendLog = (msg) => { logBox.innerHTML += `> ${msg}<br>`; };

            const payload = {
                name: document.getElementById('contact-name').value,
                message: document.getElementById('wish-message').value,
                image: AppState.capturedImageBase64,
                exp: Date.now() + (72 * 60 * 60 * 1000) // 72 Hours expiry
            };

            const userPassword = document.getElementById('wish-password').value;
            const secretKey = CryptoJS.lib.WordArray.random(128/8).toString(); // Short key
            const compositeKey = secretKey + userPassword;

            setTimeout(() => {
                appendLog("Encrypting with AES-256...");
                const encryptedData = CryptoJS.AES.encrypt(JSON.stringify(payload), compositeKey).toString();

                appendLog("Bypassing Network entirely...");
                appendLog("Embedding payload into URL Hash...");
                
                // Put everything directly into the URL (No cloud needed!)
                const baseUrl = window.location.href.split('?')[0].split('#')[0];
                const safePayload = encodeURIComponent(encryptedData);
                
                AppState.secureUrl = `${baseUrl}#data=${safePayload}&k=${secretKey}`;
                
                appendLog("✅ Link Generated Successfully!");
                setTimeout(() => { buildDeliveryModule(AppState.secureUrl); }, 1000);
            }, 500);
        }

        function buildDeliveryModule(url) {
            navTo('screen-delivery');
            document.getElementById('qrcode').innerHTML = "";
            // Use just the base URL for QR to keep it scannable, but full link for copy
            new QRCode(document.getElementById('qrcode'), { text: url, width: 128, height: 128, colorDark: "#000", colorLight: "#fff" });
        }

        function copySecureUrl() {
            navigator.clipboard.writeText(AppState.secureUrl);
            alert("Secure Link Copied! Send it via WhatsApp, Email, or Text!");
        }

        // --- RECIPIENT LOGIC (STATELESS) ---
        window.onload = () => {
            if (window.location.hash.includes("data=")) {
                document.getElementById('wearable-device').style.display = 'none';
                document.getElementById('viewer-device').classList.add('active');
            }
        };

        function authenticateRecipient() {
            // Extract data directly from the URL Link
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const encryptedData = hashParams.get('data');
            const secretKey = hashParams.get('k');
            
            const enteredPassword = document.getElementById('recipient-password').value;

            if (!enteredPassword) { alert("Please enter the password."); return; }

            // Anti-Replay Check (Simulates self-destruct)
            if(localStorage.getItem('viewed_' + secretKey)) {
                alert("This wish has already been viewed and self-destructed.");
                return;
            }

            try {
                const compositeKey = secretKey + enteredPassword;
                const bytes = CryptoJS.AES.decrypt(encryptedData, compositeKey);
                const decryptedString = bytes.toString(CryptoJS.enc.Utf8);

                if (!decryptedString) throw new Error("Wrong Password");

                const decryptedPayload = JSON.parse(decryptedString);

                if (Date.now() > decryptedPayload.exp) {
                    alert("This wish has expired after 72 hours."); return;
                }

                // Mark as viewed to simulate destruction
                localStorage.setItem('viewed_' + secretKey, 'true');
                
                // Erase the data from the URL bar instantly so it can't be copied
                history.replaceState(null, "", window.location.pathname);

                renderAnimationEngine(decryptedPayload);

            } catch (e) {
                const passInput = document.getElementById('recipient-password');
                passInput.style.borderColor = "var(--danger)";
                passInput.value = "";
                passInput.placeholder = "Wrong Password";
                setTimeout(() => { passInput.style.borderColor = "var(--accent)"; passInput.placeholder = "••••"; }, 1500);
            }
        }

        function renderAnimationEngine(data) {
            document.getElementById('auth-gate').style.display = 'none';
            const renderCanvas = document.getElementById('render-canvas');
            renderCanvas.style.display = 'flex';

            const msgEl = document.getElementById('animated-msg');
            msgEl.innerText = `${data.name},\n${data.message}`;
            msgEl.classList.add('fade-in');

            if(data.image) document.getElementById('decrypted-media').src = data.image;

            document.getElementById('forensic-watermark').innerText = `Decrypted locally | Do Not Share`;

            const end = Date.now() + 5000;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#fde047', '#38bdf8'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#fde047', '#db2777'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
